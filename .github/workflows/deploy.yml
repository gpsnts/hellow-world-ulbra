name: Deploy to GitHub Pages (gh-pages branch)

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          # Use a user-provided Personal Access Token (recommended) falling back to the GITHUB_TOKEN
          github_token: ${{ secrets.GH_PAGES_TOKEN || github.token }}
          publish_dir: ./dist
          publish_branch: gh-pages
